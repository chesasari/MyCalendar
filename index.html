<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出社場所カレンダー - 4月</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <h1>出社場所 <span>4月</span></h1>
                <div class="actions">
                    <button id="add-to-calendar" class="btn-primary">
                        <span class="icon">📅</span> カレンダーに登録
                    </button>
                    <button id="notification-toggle" class="btn-secondary">
                        <span class="icon">🔔</span> 通知設定
                    </button>
                </div>
            </div>
        </header>
        
        <main>
            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="day-label">日</div>
                    <div class="day-label">月</div>
                    <div class="day-label">火</div>
                    <div class="day-label">水</div>
                    <div class="day-label">木</div>
                    <div class="day-label">金</div>
                    <div class="day-label">土</div>
                </div>
                <div id="calendar-body" class="calendar-grid">
                    <!-- JS will populate -->
                </div>
            </div>
            
            <div class="info-card">
                <h2>今日の出社場所</h2>
                <div id="today-info" class="today-display">
                    読み込み中...
                </div>
            </div>
        </main>

        <div id="notification-modal" class="modal hidden">
            <div class="modal-content">
                <h3>通知設定</h3>
                <p>前日の指定した時間に、翌日の出社場所を通知します。</p>
                <div class="time-picker">
                    <input type="time" id="notification-time" value="08:00">
                </div>
                <div class="modal-buttons">
                    <button id="save-notification" class="btn-primary">保存</button>
                    <button id="close-modal" class="btn-text">キャンセル</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
